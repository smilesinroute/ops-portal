openapi: 3.0.3
info:
  title: Ops Backend API (MVP)
  version: 0.1.0
servers:
  - url: https://ops.example.com
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/auth/login:
    post:
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401':
          description: Invalid credentials
  /api/orders:
    get:
      summary: List orders (admin/dispatcher) or assigned (driver)
      parameters:
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: List of orders
    post:
      summary: Create order (admin/dispatcher)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_type, pickup_city]
              properties:
                service_type: { type: string, enum: [notary, courier, combined] }
                pickup_city: { type: string }
                pickup_zip: { type: string }
                delivery_city: { type: string }
                delivery_zip: { type: string }
                urgency: { type: string, enum: [standard, rush], default: standard }
                document_type: { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Created
  /api/orders/{id}:
    get:
      summary: Get order by ID (admin/dispatcher or assigned driver)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order detail
        '403':
          description: Forbidden
    patch:
      summary: Update order fields (admin/dispatcher)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pickup_city: { type: string }
                delivery_city: { type: string }
                notes: { type: string }
                base_fee: { type: number }
                rush_fee: { type: number }
                notary_fee: { type: number }
                mileage_fee: { type: number }
                total_fee: { type: number }
      responses:
        '200':
          description: Updated
  /api/orders/{id}/assign:
    post:
      summary: Assign/unassign driver (admin/dispatcher)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Assignment updated
  /api/orders/{id}/status:
    post:
      summary: Transition order status (admin/dispatcher or assigned driver)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [assign, pickup_start, pickup_complete, notary_start, complete, cancel, deliver]
                note:
                  type: string
      responses:
        '200':
          description: Status updated + event logged
        '409':
          description: Invalid transition
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT