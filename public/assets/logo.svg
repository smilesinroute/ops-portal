<!-- Smiles in Route Logo SVG -->
<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Truck Icon -->
  <g transform="translate(10, 15)">
    <!-- Truck Body -->
    <rect x="0" y="20" width="35" height="25" rx="3" fill="#F97316"/>
    <!-- Truck Cab -->
    <rect x="35" y="15" width="20" height="30" rx="3" fill="#EA580C"/>
    <!-- Windshield -->
    <rect x="37" y="17" width="16" height="12" rx="2" fill="#FED7AA"/>
    <!-- Wheels -->
    <circle cx="10" cy="48" r="6" fill="#374151"/>
    <circle cx="10" cy="48" r="3" fill="#9CA3AF"/>
    <circle cx="45" cy="48" r="6" fill="#374151"/>
    <circle cx="45" cy="48" r="3" fill="#9CA3AF"/>
    <!-- Smile on truck -->
    <path d="M15 35 Q25 40 35 35" stroke="#FED7AA" stroke-width="2" fill="none"/>
    <circle cx="20" cy="30" r="1.5" fill="#FED7AA"/>
    <circle cx="30" cy="30" r="1.5" fill="#FED7AA"/>
  </g>
  
  <!-- Company Name -->
  <text x="80" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F97316">
    Smiles
  </text>
  <text x="80" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#EA580C">
    in Route
  </text>
  
  <!-- Decorative Route Line -->
  <path d="M75 40 Q120 25 165 40 Q200 55 235 40" stroke="#FCD34D" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Small delivery boxes -->
  <rect x="190" y="35" width="8" height="8" rx="1" fill="#FBBF24" opacity="0.8"/>
  <rect x="200" y="30" width="6" height="6" rx="1" fill="#F59E0B" opacity="0.8"/>
  <rect x="210" y="38" width="7" height="7" rx="1" fill="#FBBF24" opacity="0.8"/>
</svg>
